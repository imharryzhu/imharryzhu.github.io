<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朱辉 · 个人主页</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #4f6ef7;
      --primary-dark: #3a56d4;
      --bg: #f5f7ff;
      --card-bg: #ffffff;
      --text: #2d2d2d;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(79, 110, 247, 0.10);
      --radius: 16px;
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
        "WenQuanYi Micro Hei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    /* ─── Card ─────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 680px;
      width: 100%;
      overflow: hidden;
    }

    /* ─── Hero banner ───────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, #4f6ef7 0%, #7c3aed 100%);
      height: 140px;
      position: relative;
    }

    /* ─── Profile section ───────────────────────────── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 32px 32px;
      position: relative;
    }

    .avatar-wrapper {
      margin-top: -56px;
      border-radius: 50%;
      border: 4px solid #ffffff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      width: 112px;
      height: 112px;
      overflow: hidden;
      background: #e5e7eb;
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name {
      margin-top: 16px;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .alias {
      font-size: 1rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .tagline {
      margin-top: 12px;
      font-size: 0.95rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      max-width: 440px;
    }

    /* ─── Badges ────────────────────────────────────── */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .badge {
      background: #eef2ff;
      color: var(--primary);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    /* ─── Divider ───────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 32px;
    }

    /* ─── Info section ──────────────────────────────── */
    .info {
      padding: 24px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .info-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ─── Links ─────────────────────────────────────── */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      padding: 0 32px 32px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }

    .link-btn:hover {
      transform: translateY(-2px);
    }

    .link-btn.github {
      background: #1a1a2e;
      color: #ffffff;
    }

    .link-btn.github:hover {
      background: #0d0d1a;
    }

/* ─── Footer ────────────────────────────────────── */
    footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    /* ─── Responsive ────────────────────────────────── */
    @media (max-width: 480px) {
      .info {
        grid-template-columns: 1fr;
      }

      .name {
        font-size: 1.4rem;
      }

      .divider, .profile, .info, .links {
        padding-left: 20px;
        padding-right: 20px;
      }

      .divider {
        margin: 0 20px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="hero"></div>

    <div class="profile">
      <div class="avatar-wrapper">
        <img
          src="https://github.com/imharryzhu.png"

      <h1 class="name">朱辉</h1>

        致力于构建简洁、实用的软件产品。
      </p>

      <div class="badges">
        <span class="badge">软件开发</span>
        <span class="badge">开源爱好者</span>
        <span class="badge">全栈工程师</span>
        <span class="badge">终身学习者</span>

    </div>

    <hr class="divider" />

    <div class="info">

</body>
